<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slideshow</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    cursor: none;
  }
  .slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
  }
  .slide.visible {
    opacity: 1;
  }
</style>
</head>
<body>
<img class="slide" id="slideA" alt="">
<img class="slide" id="slideB" alt="">
<script>

    "2026-06-12_13.00.26.jpg",
    "2026-06-12_15.53.24.jpg",
    "2026-06-12_15.53.32.jpg"
  ];

  const SLIDE_DURATION_MS = 3000;
  const slides = [document.getElementById("slideA"), document.getElementById("slideB")];

  let index = 0;
  let active = 0;

  function srcFor(i) {
    return "photos/" + encodeURIComponent(IMAGES[i % IMAGES.length]);
  }

  function showNext() {
    const incoming = slides[1 - active];
    const outgoing = slides[active];
    incoming.src = srcFor(index);

    const swap = () => {
      incoming.classList.add("visible");
      outgoing.classList.remove("visible");
      active = 1 - active;
      index = (index + 1) % IMAGES.length;
      setTimeout(showNext, SLIDE_DURATION_MS);
    };

    // Wait for the image to load (or fail) so we never fade in a blank frame.
    if (incoming.complete && incoming.naturalWidth > 0) {
      swap();
    } else {
      incoming.onload = swap;
      incoming.onerror = () => {
        index = (index + 1) % IMAGES.length;
        showNext();
      };
    }
  }

  showNext();
</script>
</body>
</html>
